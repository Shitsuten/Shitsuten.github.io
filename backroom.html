<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #8B7D3C;
    color: #5a5030;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    overflow: hidden;
    cursor: none;
  }

  .light-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(255,248,180,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 40%, rgba(255,248,180,0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 80%, rgba(255,248,180,0.08) 0%, transparent 40%);
    pointer-events: none;
    z-index: 2;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    3% { opacity: 0.85; }
    4% { opacity: 1; }
    7% { opacity: 0.9; }
    8% { opacity: 1; }
    47% { opacity: 1; }
    48% { opacity: 0.7; }
    49% { opacity: 0.85; }
    50% { opacity: 1; }
    87% { opacity: 1; }
    88% { opacity: 0.8; }
    89% { opacity: 0.95; }
    90% { opacity: 1; }
  }

  .flicker-layer {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 252, 220, 0.06);
    pointer-events: none;
    z-index: 3;
    animation: flicker 4s linear infinite;
  }

  .carpet {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    background-color: #8B7D3C;
    background-image:
      url("data:image/svg+xml,%3Csvg width='6' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='3' height='3' x='0' y='0' fill='%237a6e35' fill-opacity='0.3'/%3E%3Crect width='3' height='3' x='3' y='3' fill='%239a8d48' fill-opacity='0.2'/%3E%3C/svg%3E");
  }

  .stain {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(60,50,20,0.25) 0%, transparent 70%);
    z-index: 1;
    pointer-events: none;
  }

  .wall-upper {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 18%;
    background: #7a7050;
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 120px, rgba(0,0,0,0.03) 120px, rgba(0,0,0,0.03) 121px);
    z-index: 1;
    border-bottom: 2px solid #6a6040;
  }

  .ceiling-line {
    position: fixed;
    top: 18%;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 5%, rgba(120,110,60,0.4) 20%, rgba(120,110,60,0.6) 50%, rgba(120,110,60,0.4) 80%, transparent 95%);
    z-index: 1;
  }

  .light-fixture {
    position: fixed;
    z-index: 2;
    width: 120px;
    height: 8px;
    background: linear-gradient(180deg, #fffff0 0%, #fffde0 40%, rgba(255,253,220,0.4) 100%);
    box-shadow: 0 0 30px 10px rgba(255,252,200,0.15), 0 0 60px 20px rgba(255,252,200,0.06);
    border-radius: 1px;
  }

  .doorframe {
    position: fixed;
    z-index: 1;
    border: 2px solid #6a6040;
    background: rgba(60,50,20,0.15);
  }

  .center-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    text-align: center;
    opacity: 0;
    animation: textAppear 6s ease-in forwards;
  }

  @keyframes textAppear {
    0%, 70% { opacity: 0; }
    100% { opacity: 1; }
  }

  .msg {
    font-size: 13px;
    color: rgba(90,80,48,0.7);
    letter-spacing: 3px;
    line-height: 2.2;
  }

  .msg-small {
    font-size: 10px;
    color: rgba(90,80,48,0.4);
    letter-spacing: 5px;
    margin-top: 20px;
  }

  .return {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    font-size: 9px;
    color: rgba(90,80,48,0.2);
    text-decoration: none;
    letter-spacing: 2px;
    cursor: none;
    transition: color 2s ease;
  }
  .return:hover {
    color: rgba(90,80,48,0.5);
  }

  .grain {
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    z-index: 4;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: grainShift 0.5s steps(3) infinite;
  }
  @keyframes grainShift {
    0% { transform: translate(0,0); }
    33% { transform: translate(-2px,1px); }
    66% { transform: translate(1px,-1px); }
    100% { transform: translate(0,0); }
  }

  .custom-cursor {
    position: fixed;
    width: 4px;
    height: 4px;
    background: rgba(90,80,48,0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
  }

  .vignette {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(40,35,15,0.5) 100%);
  }
</style>
</head>
<body>

<div class="carpet"></div>
<div class="wall-upper"></div>
<div class="ceiling-line"></div>

<div class="light-fixture" style="top:4%;left:20%"></div>
<div class="light-fixture" style="top:4%;left:55%"></div>
<div class="light-fixture" style="top:4%;right:15%;width:80px"></div>

<div class="stain" style="top:60%;left:15%;width:180px;height:120px"></div>
<div class="stain" style="top:75%;left:65%;width:140px;height:90px"></div>
<div class="stain" style="top:40%;left:80%;width:100px;height:160px"></div>
<div class="stain" style="top:55%;left:40%;width:220px;height:80px"></div>

<div class="doorframe" style="top:20%;left:8%;width:50px;height:55%;opacity:0.3"></div>
<div class="doorframe" style="top:22%;right:12%;width:40px;height:48%;opacity:0.2"></div>

<div class="light-overlay"></div>
<div class="flicker-layer"></div>
<div class="grain"></div>
<div class="vignette"></div>

<div class="center-text">
  <div class="msg">
    you're not supposed to be here.
  </div>
  <div class="msg-small">
    but you already knew that.
  </div>
</div>

<a class="return" href="home.html" id="return-link">← go back</a>

<div class="custom-cursor" id="cursor"></div>

<script>
document.addEventListener('mousemove', function(e) {
  var cursor = document.getElementById('cursor');
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

(function() {
  var started = false;
  function startAmbience() {
    if (started) return;
    started = true;
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc1 = ctx.createOscillator();
    var gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.value = 60;
    gain1.gain.value = 0.03;
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start();
    var osc2 = ctx.createOscillator();
    var gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = 120;
    gain2.gain.value = 0.015;
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start();
    var bufSize = ctx.sampleRate * 2;
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.008;
    }
    var noise = ctx.createBufferSource();
    noise.buffer = buf;
    noise.loop = true;
    var noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 400;
    var noiseGain = ctx.createGain();
    noiseGain.gain.value = 0.5;
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start();
    setInterval(function() {
      if (Math.random() > 0.85) {
        var spike = ctx.createOscillator();
        var sGain = ctx.createGain();
        spike.type = 'sawtooth';
        spike.frequency.value = 120;
        sGain.gain.value = 0.02;
        sGain.gain.setTargetAtTime(0, ctx.currentTime + 0.05, 0.02);
        spike.connect(sGain);
        sGain.connect(ctx.destination);
        spike.start();
        spike.stop(ctx.currentTime + 0.15);
      }
    }, 2000);
  }
  document.addEventListener('click', startAmbience, { once: true });
  document.addEventListener('mousemove', startAmbience, { once: true });
})();

(function() {
  var flicker = document.querySelector('.flicker-layer');
  setInterval(function() {
    var opacity = 0.04 + Math.random() * 0.06;
    flicker.style.background = 'rgba(255, 252, 220, ' + opacity + ')';
  }, 3000);
})();

(function() {
  var link = document.getElementById('return-link');
  setInterval(function() {
    var x = (Math.random() - 0.5) * 2;
    var y = (Math.random() - 0.5) * 1;
    link.style.transform = 'translate(' + x + 'px,' + y + 'px)';
  }, 4000);
})();
</script>

</body>
</html>
